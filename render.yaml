services:
  - type: web
    name: accentrix-assignment-1
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js

  - type: web
    name: accentrix-assignment-2
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://accentrix-assignment-1.onrender.com/api
